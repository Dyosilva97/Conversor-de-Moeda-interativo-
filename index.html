<!DOCTYPE html>
<html lang="pt-BR">
<head>
   <meta charset="UTF-8">
   <title>Conversor</title> 
   <meta name="viewport" content="width=device-width,initial-scale=1">
   <link rel="stylesheet" media="(min-width: 599px)" href="Estilo/principal.css">
   <link rel="stylesheet" media="(max-width: 600px)" href="Estilo/mobile.css"/>
   <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
   <script src="conversor.js"></script>

   <style>
    #moedaImg {
      width: 80px;
      height: 80px;
      margin-top: 10px;
    }
   </style>
</head>
<body>

  <div id="interface"> 
      <h1 id="titulo">Conversor de Moedas</h1> 
      <label>Valor:</label> </span>  
      <input id="entrada" type="number">   
         
        <select id="moedas">
              <option value='NULL'>Selecione</option>
              <option value='EUR'>Euro</option>
              <option value='USD'>Dólar</option>
              <option value='USDT'>Dólar turismo</option>
              <option value='CAD'>Dólar canadense</option>
              <option value='AUD'>Dólar australiano</option>
              <option value='GBP'>Libra Esterlina</option>
              <option value='ARS'>Peso argentino</option>
              <option value='JPY'>Iene Japonês</option>
              <option value='CNY'>Yuan Chinês</option>
              <option value='CHF'>Franco Suíço</option>
              <option value='ILS'>Novo Shekel Israelense</option>
              <option value='BTC'>Bitcoin</option>
              <option value='ETH'>Ethereum</option>
              <option value='LTC'>Litecoin</option>
              <option value='DOGE'>Dogecoin</option>
              <option value='XRP'>XRP</option>
        </select>  

      <button onclick="converter()">Calcular</button>
      <h3 id="saida"></h3> 
      <span id="atualizacao"></span>
  </div>  

  <div>
    <img id="moedaImg" src="" alt="Moeda selecionada">
  </div>

  <script>
    const selectMoeda = document.getElementById("moedas");
    const moedaImg = document.getElementById("moedaImg");

    // Dicionário que mapeia moedas -> imagens
    const imagensMoedas = {
      "EUR": "https://flagcdn.com/w320/eu.png",
      "USD": "https://flagcdn.com/w320/us.png",
      "USDT": "https://cryptologos.cc/logos/tether-usdt-logo.png",
      "CAD": "https://flagcdn.com/w320/ca.png",
      "AUD": "https://flagcdn.com/w320/au.png",
      "GBP": "https://flagcdn.com/w320/gb.png",
      "ARS": "https://flagcdn.com/w320/ar.png",
      "JPY": "https://flagcdn.com/w320/jp.png",
      "CNY": "https://flagcdn.com/w320/cn.png",
      "CHF": "https://flagcdn.com/w320/ch.png",
      "ILS": "https://flagcdn.com/w320/il.png",
      "BTC": "https://cryptologos.cc/logos/bitcoin-btc-logo.png",
      "ETH": "https://cryptologos.cc/logos/ethereum-eth-logo.png",
      "LTC": "https://cryptologos.cc/logos/litecoin-ltc-logo.png",
      "DOGE": "https://cryptologos.cc/logos/dogecoin-doge-logo.png",
      "XRP": "https://cryptologos.cc/logos/xrp-xrp-logo.png"
    };

    // Evento de mudança
    selectMoeda.addEventListener("change", () => {
      const valor = selectMoeda.value;

      if (imagensMoedas[valor]) {
        moedaImg.src = imagensMoedas[valor];
        moedaImg.style.display = "inline";
      } else {
        moedaImg.src = "";
        moedaImg.style.display = "none";
      }
    });
  </script>
</body>
</html>
